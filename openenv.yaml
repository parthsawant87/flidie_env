# openenv.yaml — FLIDIE OpenEnv Submission
spec_version: 1.0
name: flidie-env
type: space
runtime: docker
port: 7860
app: server.app:app

version: "1.0.0"
description: >
  Finance and Legal Decision Intelligence Environment for Indian financial
  scenarios. AI agents navigate tax optimization, GST compliance, ESOP
  taxation, and startup legal decisions.

author: groot87

tags:
  - openenv
  - finance
  - legal
  - india
  - tax
  - compliance

task_ids:
  - financial_optimize
  - tax_planning
  - startup_compliance

environment:
  name: "flidie-env"
  description: "Finance and Legal Decision Intelligence Environment for Indian financial scenarios."
  version: "1.0.0"
  tasks:
    - id: financial_optimize
      name: "Financial Decision Optimization"
      difficulty: easy
      description: "Single-step decision: choose the optimal financial action for an Indian taxpayer."
      max_steps: 6
      score_range: [0.1, 0.99]
      grader: flidie-env.graders.grade_easy

    - id: tax_planning
      name: "Multi-Step Tax Planning"
      difficulty: medium
      description: "Three-step scenario where each decision changes the financial state."
      max_steps: 10
      score_range: [0.1, 0.99]
      grader: flidie-env.graders.grade_medium

    - id: startup_compliance
      name: "Startup Compliance Audit"
      difficulty: hard
      description: "Startup compliance audit across four dimensions."
      max_steps: 10
      score_range: [0.1, 0.99]
      grader: flidie-env.graders.grade_hard

endpoints:
  reset: /reset
  step:  /step
  state: /state
  health: /health

action_space:
  type: structured
  description: "Five action types. choose_option terminates the episode."
  actions:
    - choose_option
    - calculate
    - flag_compliance_risk
    - escalate_to_professional
    - ask_clarification

observation_space:
  type: structured
  description: "ScenarioObservation. Ground truth structurally excluded."

reward:
  type: float
  range: [0.1, 0.99]
  description: "All rewards strictly inside open interval (0, 1)."