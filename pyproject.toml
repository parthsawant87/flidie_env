[project]
name = "flidie-env"
version = "1.0.0"
description = "Finance & Legal Decision Intelligence Environment — OpenEnv hackathon submission"
requires-python = ">=3.10"
dependencies = [
    # Core OpenEnv runtime (provides FastAPI server + HTTP client types)
    # install from github
    # "openenv-core[core] @ git+https://github.com/meta-pytorch/OpenEnv.git",
    # Environment-specific dependencies
    # Add all dependencies needed for your environment here
    # Examples:
    # "numpy>=1.19.0",
    # "torch>=2.0.0",
    # "gymnasium>=0.29.0",
    # "openspiel>=1.0.0",
    # "smolagents>=1.22.0,<2",
    "fastapi==0.111.0",
    "uvicorn==0.29.0",
    "pydantic==2.7.1",
    "openenv-core==0.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest==8.2.0",
    "httpx==0.27.0",
]

[project.scripts]
# Server entry point - enables running via: uv run --project . server
# or: python -m flidie_env.server.app
server = "flidie_env.server.app:main"

[tool.setuptools]
include-package-data = true
packages = ["flidie_env", "flidie_env.server"]
package-dir = { "flidie_env" = ".", "flidie_env.server" = "server" }


[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# uv configuration
[tool.uv]
dev-dependencies = [
    "pytest==8.2.0",
    "httpx==0.27.0",
]

[tool.hatch.build.targets.wheel]
packages = ["."]